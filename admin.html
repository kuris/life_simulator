<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CMS 관리자 — 대한민국 직장인 생존기</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #121216;
      --surface2: #1e1e24;
      --primary: #00ff88;
      --secondary: #00ccff;
      --bad: #ff4d4d;
      --text: #e0e0e6;
      --dim: #a0a0a6;
      --border: #33333c;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0; padding: 40px 20px; line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Share Tech Mono', monospace; font-size: 28px; color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; border-left: 5px solid var(--primary); padding-left: 15px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--secondary); display: flex; align-items: center; gap: 10px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 8px; font-weight: 700; }
    input, select, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; color: var(--text); font-family: inherit; font-size: 14px;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,136,.1); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .btn {
      padding: 14px 28px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: .2s; margin-top: 10px;
    }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,255,136,.3); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .json-output {
      background: #000; color: #0f0; padding: 20px; border-radius: 8px;
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      white-space: pre-wrap; overflow-x: auto; border: 1px solid #1a1a1a;
      max-height: 400px;
    }
    .copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-weight: 700; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>Scenarios / CMS Admin</h1>

  <div class="card">
    <div class="card-title">📝 시나리오 기본 정보</div>
    <div class="grid">
      <div class="form-group">
        <label>시나리오 ID (중복 주의)</label>
        <input type="text" id="s-id" placeholder="imf_1997" oninput="updateJSON()"/>
      </div>
      <div class="form-group">
        <label>날짜 (YYYY-MM-DD)</label>
        <input type="date" id="s-date" oninput="updateJSON()"/>
      </div>
    </div>
    <div class="grid">
      <div class="form-group">
        <label>시대 매칭 (Base Era)</label>
        <select id="s-era" onchange="updateJSON()">
           <option value="1980">1980년대</option>
           <option value="1997">1997 IMF</option>
           <option value="2000">2000년대 IT</option>
           <option value="2010">2010년대</option>
           <option value="2020">2020 코로나</option>
           <option value="2026">2026 AI</option>
        </select>
      </div>
      <div class="form-group">
        <label>제목 (이모지 포함 가능)</label>
        <input type="text" id="s-title" placeholder="💥 국가 부도의 날" oninput="updateJSON()"/>
      </div>
    </div>
    <div class="form-group">
      <label>시나리오 설명</label>
      <textarea id="s-desc" rows="3" oninput="updateJSON()"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎬 역사적 사건 (Fixed Event)</div>
    <div class="grid">
      <div class="form-group">
        <label>발생 시각 (HH:MM)</label>
        <input type="time" id="e-time" value="14:00" oninput="updateJSON()"/>
      </div>
      <div class="form-group">
        <label>사건 명칭</label>
        <input type="text" id="e-title" placeholder="긴급 발표" oninput="updateJSON()"/>
      </div>
    </div>
    <div class="form-group">
      <label>스토리 내용 (Enter로 구분)</label>
      <textarea id="e-story" rows="4" placeholder="라디오에서 뉴스가 흘러나온다.
경제가 무너지고 있다는 소식이다." oninput="updateJSON()"></textarea>
    </div>
    <div class="form-group">
      <label>선택지 1 (내용 | 효과 | 결과)</label>
      <input type="text" id="choice1" placeholder="은행에 들른다 | stress:10,money:-5000 | 불안감이 엄습한다." oninput="updateJSON()"/>
    </div>
    <div class="form-group">
      <label>선택지 2 (내용 | 효과 | 결과)</label>
      <input type="text" id="choice2" placeholder="그냥 출근한다 | stress:5 | 묵묵히 일했다." oninput="updateJSON()"/>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💾 생성된 JSON (Copy & Paste to scenarios.json)</div>
    <div class="json-output" id="json-result">{}</div>
    <button class="btn btn-primary" onclick="copyJSON()">📋 클립보드 복사</button>
    <button class="btn btn-secondary" onclick="resetForm()">🔄 초기화</button>
  </div>
</div>

<div id="copy-toast" class="copy-toast">복사되었습니다!</div>

<script>
function updateJSON() {
  const storyLines = document.getElementById('e-story').value.split('\n').filter(l => l.trim() !== '');

  const parseChoice = (str) => {
    if (!str) return null;
    const parts = str.split('|').map(p => p.trim());
    if (parts.length < 2) return null;

    const effectObj = {};
    parts[1].split(',').forEach(eff => {
      const pair = eff.split(':');
      if (pair.length === 2) effectObj[pair[0].trim()] = parseInt(pair[1].trim());
    });

    return {
      label: '▶ ' + parts[0],
      effect: effectObj,
      result: [{ t: 'story', m: parts[2] || '...' }]
    };
  };

  const scenario = {
    id: document.getElementById('s-id').value || 'new_scenario',
    date: document.getElementById('s-date').value || '2000-01-01',
    eraId: document.getElementById('s-era').value,
    title: document.getElementById('s-title').value || '제목 없음',
    desc: document.getElementById('s-desc').value || '설명 없음',
    icon: '📍',
    events: [
      {
        time: document.getElementById('e-time').value,
        type: 'scenario',
        key: 'evt_' + Date.now(),
        title: document.getElementById('e-title').value || '고정 이벤트',
        loc: '📍 역사적 장소',
        desc: storyLines.map(l => ({ t: 'bad', m: l })),
        choices: [parseChoice(document.getElementById('choice1').value), parseChoice(document.getElementById('choice2').value)].filter(c => c !== null)
      }
    ]
  };

  document.getElementById('json-result').innerText = JSON.stringify(scenario, null, 2);
}

function copyJSON() {
  const text = document.getElementById('json-result').innerText;
  navigator.clipboard.writeText(text);
  const toast = document.getElementById('copy-toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1500);
}

function resetForm() {
  if (confirm('모든 내용을 초기화할까요?')) {
    location.reload();
  }
}

// Initial update
updateJSON();
</script>
</body>
</html>
